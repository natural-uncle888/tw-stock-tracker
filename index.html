<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台股損益管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style type="text/tailwindcss">
        [v-cloak] { display: none !important; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(59,130,246,0.16), transparent 30%),
                radial-gradient(circle at top right, rgba(99,102,241,0.12), transparent 28%),
                linear-gradient(180deg, #f8fbff 0%, #f3f7fc 42%, #edf3fa 100%);
            color: #334155;
            -webkit-user-select: none;
            user-select: none;
            padding-bottom: env(safe-area-inset-bottom);
            min-height: 100vh;
            position: relative;
        }
        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: auto;
            border-radius: 9999px;
            filter: blur(70px);
            pointer-events: none;
            z-index: 0;
            opacity: .55;
        }
        body::before {
            width: 260px;
            height: 260px;
            left: -80px;
            top: 90px;
            background: rgba(96,165,250,.24);
        }
        body::after {
            width: 280px;
            height: 280px;
            right: -100px;
            top: 180px;
            background: rgba(129,140,248,.18);
        }

        .app-shell { position: relative; z-index: 1; }
        .card { @apply bg-white/90 backdrop-blur-xl rounded-[2rem] shadow-[0_20px_60px_-24px_rgba(15,23,42,0.28)] border border-white/80 p-6 md:p-8 mb-8 transition-all duration-300; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 26px 70px -28px rgba(15, 23, 42, 0.32); }
        .input-group { @apply flex flex-col relative; }

        /* 按鈕樣式 */
        .btn { @apply h-[50px] px-6 rounded-2xl font-bold tracking-wide transition-all duration-200 transform hover:-translate-y-1 active:scale-95 flex items-center justify-center cursor-pointer text-base border-0; box-shadow: 0 12px 28px -16px rgba(15, 23, 42, 0.35); }
        .btn-primary { @apply bg-gradient-to-br from-blue-600 to-indigo-700 text-white; }
        .btn-success { @apply bg-gradient-to-br from-emerald-500 to-teal-600 text-white; }
        .btn-secondary { @apply bg-white/95 text-slate-600 border border-slate-200 hover:border-slate-300 hover:text-slate-800 hover:bg-white; }

        .filter-btn { @apply px-4 py-2 rounded-xl text-sm font-bold border border-slate-200 text-slate-500 hover:bg-white hover:text-blue-600 hover:border-blue-300 transition bg-white/90; }
        .filter-btn.active { @apply bg-blue-50 text-blue-700 border-blue-500 shadow-sm; }

        .status-badge { @apply inline-flex items-center justify-center w-5 h-5 rounded-full text-[10px] font-black border ml-1 shadow-sm leading-none; }
        .badge-5m { @apply bg-orange-50 text-orange-600 border-orange-500; }
        .badge-20m { @apply bg-purple-50 text-purple-600 border-purple-600; }
        .text-warning { @apply text-red-600 underline decoration-red-300 decoration-wavy underline-offset-4; }

        .text-up { @apply text-red-600; }
        .text-down { @apply text-green-600; }
        
        .suggestions-list { @apply absolute top-[60px] left-0 z-50 w-full bg-white border-2 border-slate-200 rounded-xl shadow-2xl overflow-hidden max-h-60 overflow-y-auto; }
        .suggestion-item { @apply px-4 py-3 hover:bg-blue-50 cursor-pointer text-gray-800 font-bold border-b border-slate-100 last:border-0 flex justify-between items-center transition-colors; }

        .context-menu { @apply fixed bg-white rounded-xl shadow-2xl border border-slate-100 z-[999] overflow-hidden min-w-[160px] transform scale-100 transition-all duration-100; }
        .context-item { @apply px-4 py-3 text-sm font-bold text-slate-600 hover:bg-blue-50 hover:text-blue-600 cursor-pointer flex items-center gap-2 border-b border-slate-50 last:border-0; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-scroll { scrollbar-width: thin; scrollbar-color: rgba(148,163,184,.55) transparent; }
        .modal-scroll::-webkit-scrollbar { width: 8px; }
        .modal-scroll::-webkit-scrollbar-track { background: transparent; }
        .modal-scroll::-webkit-scrollbar-thumb { background: rgba(148,163,184,.42); border-radius: 9999px; }
        .modal-scroll::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,.58); }

        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slide-up 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

        .tab-switch { @apply hidden md:inline-flex items-center bg-gray-100 rounded-2xl p-1 border border-gray-200 shadow-sm; }
        .tab-btn { @apply relative inline-flex items-center gap-2 px-4 py-2 rounded-2xl font-semibold text-sm text-gray-600 transition-all duration-200; }
        .tab-btn:hover { @apply text-gray-900; }
        .tab-btn.active { @apply bg-white text-gray-900 shadow-sm; }
        .tab-btn.active::after { content: ""; position: absolute; inset: 0; border-radius: 1rem; box-shadow: inset 0 1px 0 rgba(255,255,255,0.6); pointer-events: none; }

        /* Toggle Switch CSS */
        .toggle-checkbox:checked { right: 0; border-color: #3b82f6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #3b82f6; }
        
        /* Login Backdrop */
        .login-backdrop {
            background-image: linear-gradient(135deg, #f0f4f8 0%, #dbeafe 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        /* Custom Checkbox */
        .custom-checkbox {
            appearance: none;
            background-color: #fff;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.15em;
            height: 1.15em;
            border: 2px solid #cbd5e1;
            border-radius: 0.35em;
            display: grid;
            place-content: center;
            transition: all 0.2s;
        }
        .custom-checkbox::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .custom-checkbox:checked {
            background-color: #3b82f6;
            border-color: #3b82f6;
        }
        .custom-checkbox:checked::before {
            transform: scale(1);
        }
    
        .btn-tall{
          height: auto !important;
          min-height: 132px !important;
          padding-top: 1.5rem !important;
          padding-bottom: 1.5rem !important;
          flex-direction: column !important;
          justify-content: center !important;
          align-items: center !important;
          gap: 0.75rem !important;
          white-space: normal !important;
          text-align: center !important;
        }

        /* v4.4 UI fix: 長帳戶名稱與桌機 Header 防爆版 */
        .desktop-header { align-items: center; }
        .desktop-header .brand-block { flex: 0 0 auto; min-width: 285px; }
        .desktop-header .tab-switch { flex: 0 0 auto; }
        .header-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; align-items: center; gap: 0.75rem; min-width: 0; max-width: 560px; }
        .header-actions .btn { flex: 0 0 auto; }
        .portfolio-header-btn { min-width: 132px; max-width: 230px; justify-content: flex-start !important; gap: 0.5rem; }
        .portfolio-header-name, .portfolio-name-truncate { display: inline-block; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.15; }
        .portfolio-header-name { max-width: 145px; }
        .dashboard-portfolio-pill { max-width: min(72vw, 520px); overflow: hidden; }
        .dashboard-portfolio-pill .portfolio-name-truncate { max-width: min(48vw, 360px); vertical-align: bottom; }
        @media (max-width: 1279px) { .desktop-header { align-items: stretch; } .desktop-header .brand-block { min-width: 0; } .desktop-header .tab-switch { align-self: center; } .header-actions { max-width: none; justify-content: center; } }
        @media (max-width: 767px) { .mobile-portfolio-btn { min-width: 0; flex: 0 1 auto; } .mobile-portfolio-btn .portfolio-name-truncate { max-width: 38vw; } }


        /* Realtime save status */
        .save-status-indicator {
            position: fixed;
            right: 1rem;
            bottom: calc(env(safe-area-inset-bottom) + 5.75rem);
            z-index: 60;
            display: inline-flex;
            align-items: center;
            gap: .45rem;
            padding: .55rem .8rem;
            border: 1px solid;
            border-radius: 9999px;
            font-size: .78rem;
            font-weight: 900;
            letter-spacing: .01em;
            box-shadow: 0 18px 45px -24px rgba(15, 23, 42, .38);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            pointer-events: none;
        }
        @media (min-width: 768px) {
            .save-status-indicator {
                top: 1rem;
                bottom: auto;
            }
        }
        /* NEW: Sub-Tab Switcher Styles */
        .sub-tab-container { @apply flex p-1 bg-slate-200/50 rounded-xl mb-6 border border-slate-200; }
        .sub-tab-item { @apply flex-1 py-2.5 text-sm font-bold text-slate-500 rounded-lg transition-all duration-200 flex items-center justify-center gap-2 cursor-pointer select-none; }
        .sub-tab-item.active { @apply bg-white text-blue-600 shadow-sm; }
        .sub-tab-item:hover:not(.active) { @apply text-slate-700 bg-slate-200/50; }

    </style>
</head>
<body>

<div id="app" v-cloak class="min-h-screen"></div>

<script src="./services/storageService.js"></script>
<script src="./services/saveStatusService.js"></script>
<script src="./services/tradeService.js"></script>
<script src="./services/cashService.js"></script>
<script src="./services/priceService.js"></script>
<script src="./services/institutionalOiService.js"></script>
<script src="./services/backupService.js"></script>
<script src="./app.js"></script>
</body>
</html>
